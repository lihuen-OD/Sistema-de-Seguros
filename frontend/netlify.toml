[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — sin esto, refrescar la página en cualquier ruta que no sea
# "/" devuelve 404 (React Router maneja el ruteo client-side).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de seguridad. Probados localmente (build + vite preview + Playwright)
# contra Dashboard, Análisis Financiero y Dashboard de Matafuegos (gráficos de
# recharts, fuente de Google Fonts, imágenes de Cloudinary) sin violaciones de
# CSP ni requests bloqueados.
#
# connect-src apunta al backend real en Render (misma URL que usa VITE_API_URL).
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://res.cloudinary.com; connect-src 'self' https://res.cloudinary.com https://sistema-seguros-backend-production.onrender.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
