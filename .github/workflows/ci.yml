name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      # prisma validate/generate solo necesitan que la variable exista (no se
      # conectan a ninguna base) — pero schema.prisma la referencia como
      # directUrl, así que sin esto falla con P1012 "Environment variable not
      # found: DIRECT_URL" antes de llegar siquiera a correr los tests.
      DIRECT_URL: postgresql://test:test@localhost:5432/test_db
      JWT_SECRET: ci-only-secret-that-is-at-least-32-characters-long
      FRONTEND_URL: http://localhost:5173
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Type-check & build
        run: npm run build

      - name: Run tests
        run: npm test

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build
